<svg viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SOLE_TX (multi-locus) - no winner, stays multimapped</title>
<desc>The read has several transcript placements at different loci with equal score and no ref alignment to break the tie. Nothing picks a winner, so both placements are kept and the read stays a multimapper at MAPQ 0 (NH 2).</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="880" height="360" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="152" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="39" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="var(--warn)"/>
<text x="592" y="55" font-size="10" fill="var(--label)">softclip (S)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="592" y="71" font-size="10" fill="var(--label)">exon (genome)</text>
</g>

<!-- BEFORE -->
<text x="60" y="40" font-size="14" font-weight="600" fill="var(--tx-dark)">before &#183; two equal-score tx placements, no ref to compare</text>
<text x="60" y="64" font-size="10.5" fill="var(--sub)" font-family="Courier New, monospace">chr8:474786</text>
<rect x="200" y="52" width="202" height="20" rx="3" fill="var(--tx)"/>
<text x="301" y="66" font-size="10.5" text-anchor="middle" fill="var(--bg)">101M</text>
<rect x="402" y="52" width="100" height="20" rx="3" fill="var(--warn)"/>
<text x="452" y="66" font-size="10.5" text-anchor="middle" fill="var(--warn-dark)">50S</text>
<rect x="560" y="52" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="591" y="66" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 0</text>

<text x="60" y="100" font-size="10.5" fill="var(--sub)" font-family="Courier New, monospace">chr8:474935</text>
<rect x="200" y="88" width="100" height="20" rx="3" fill="var(--warn)"/>
<text x="250" y="102" font-size="10.5" text-anchor="middle" fill="var(--warn-dark)">50S</text>
<rect x="300" y="88" width="202" height="20" rx="3" fill="var(--tx)"/>
<text x="401" y="102" font-size="10.5" text-anchor="middle" fill="var(--bg)">101M</text>
<rect x="560" y="88" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="591" y="102" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 0</text>

<!-- REFERENCE GENOME -->
<text x="60" y="148" font-size="11" font-weight="600" fill="var(--sub)">reference genome &#183; chr8 (two tx loci ~150 bp apart, equal score)</text>
<rect x="120" y="156" width="150" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="195" y="166" font-size="9" text-anchor="middle" fill="var(--tx-dark)">locus A (474,786)</text>
<line x1="270" y1="163" x2="360" y2="163" stroke="var(--line)" stroke-width="1.4"/>
<text x="315" y="160" font-size="8.5" text-anchor="middle" fill="var(--muted)">~150 bp</text>
<rect x="360" y="156" width="150" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="435" y="166" font-size="9" text-anchor="middle" fill="var(--tx-dark)">locus B (474,935)</text>

<!-- AFTER -->
<text x="60" y="204" font-size="14" font-weight="600" fill="var(--tx-dark)">after &#183; both kept, no winner</text>
<rect x="200" y="220" width="302" height="18" rx="3" fill="var(--tx)"/>
<text x="351" y="233" font-size="9.5" text-anchor="middle" fill="var(--bg)">chr8:474786  101M50S</text>
<rect x="200" y="242" width="302" height="18" rx="3" fill="var(--tx)"/>
<text x="351" y="255" font-size="9.5" text-anchor="middle" fill="var(--bg)">chr8:474935  50S101M</text>
<rect x="560" y="231" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="591" y="245" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 0</text>
<text x="640" y="245" font-size="11" fill="var(--label)">NH:2</text>
<text x="60" y="284" font-size="10.5" fill="var(--sub)">several tx placements at different loci, equal score, no ref to break the tie - nothing picks a winner, so both are</text>
<text x="60" y="300" font-size="10.5" fill="var(--sub)">kept and the read stays a multimapper (MAPQ 0, NH:2).</text>

<text x="360" y="336" font-size="15" font-weight="600" text-anchor="middle" fill="var(--ink2)">SOLE_TX (multi-locus) &#183; no winner, stays multimapped</text>
</svg>
