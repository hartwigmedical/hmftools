<svg viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<title>SOLE_TX (multi-locus) - no winner, stays multimapped</title>
<desc>The read has several transcript placements at different loci with equal score and no ref alignment to break the tie. Nothing picks a winner, so both placements are kept and the read stays a multimapper at MAPQ 0 (NH 2).</desc>
<rect x="0" y="0" width="880" height="360" fill="#FFFFFF"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="152" height="74" rx="4" fill="#FCFCFB" stroke="#E4E2DD"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="#2F7DC6"/>
<text x="592" y="39" font-size="10" fill="#5C5953">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="#EFB94B"/>
<text x="592" y="55" font-size="10" fill="#5C5953">softclip (S)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="#E6F1FB" stroke="#4A90C4"/>
<text x="592" y="71" font-size="10" fill="#5C5953">exon (genome)</text>
</g>

<!-- BEFORE -->
<text x="60" y="40" font-size="14" font-weight="600" fill="#0C447C">before &#183; two equal-score tx placements, no ref to compare</text>
<text x="60" y="64" font-size="10.5" fill="#6B6862" font-family="Courier New, monospace">chr8:474786</text>
<rect x="200" y="52" width="202" height="20" rx="3" fill="#2F7DC6"/>
<text x="301" y="66" font-size="10.5" text-anchor="middle" fill="#FFFFFF">101M</text>
<rect x="402" y="52" width="100" height="20" rx="3" fill="#EFB94B"/>
<text x="452" y="66" font-size="10.5" text-anchor="middle" fill="#6B4E04">50S</text>
<rect x="560" y="52" width="62" height="20" rx="10" fill="#ECECEA"/>
<text x="591" y="66" font-size="11" text-anchor="middle" fill="#5C5953">MAPQ 0</text>

<text x="60" y="100" font-size="10.5" fill="#6B6862" font-family="Courier New, monospace">chr8:474935</text>
<rect x="200" y="88" width="100" height="20" rx="3" fill="#EFB94B"/>
<text x="250" y="102" font-size="10.5" text-anchor="middle" fill="#6B4E04">50S</text>
<rect x="300" y="88" width="202" height="20" rx="3" fill="#2F7DC6"/>
<text x="401" y="102" font-size="10.5" text-anchor="middle" fill="#FFFFFF">101M</text>
<rect x="560" y="88" width="62" height="20" rx="10" fill="#ECECEA"/>
<text x="591" y="102" font-size="11" text-anchor="middle" fill="#5C5953">MAPQ 0</text>

<!-- REFERENCE GENOME -->
<text x="60" y="148" font-size="11" font-weight="600" fill="#6B6862">reference genome &#183; chr8 (two tx loci ~150 bp apart, equal score)</text>
<rect x="120" y="156" width="150" height="14" rx="2" fill="#E6F1FB" stroke="#4A90C4"/>
<text x="195" y="166" font-size="9" text-anchor="middle" fill="#0C447C">locus A (474,786)</text>
<line x1="270" y1="163" x2="360" y2="163" stroke="#B8B5AE" stroke-width="1.4"/>
<text x="315" y="160" font-size="8.5" text-anchor="middle" fill="#9B9893">~150 bp</text>
<rect x="360" y="156" width="150" height="14" rx="2" fill="#E6F1FB" stroke="#4A90C4"/>
<text x="435" y="166" font-size="9" text-anchor="middle" fill="#0C447C">locus B (474,935)</text>

<!-- AFTER -->
<text x="60" y="204" font-size="14" font-weight="600" fill="#0C447C">after &#183; both kept, no winner</text>
<rect x="200" y="220" width="302" height="18" rx="3" fill="#2F7DC6"/>
<text x="351" y="233" font-size="9.5" text-anchor="middle" fill="#FFFFFF">chr8:474786  101M50S</text>
<rect x="200" y="242" width="302" height="18" rx="3" fill="#2F7DC6"/>
<text x="351" y="255" font-size="9.5" text-anchor="middle" fill="#FFFFFF">chr8:474935  50S101M</text>
<rect x="560" y="231" width="62" height="20" rx="10" fill="#ECECEA"/>
<text x="591" y="245" font-size="11" text-anchor="middle" fill="#5C5953">MAPQ 0</text>
<text x="640" y="245" font-size="11" fill="#5C5953">NH:2</text>
<text x="60" y="284" font-size="10.5" fill="#6B6862">several tx placements at different loci, equal score, no ref to break the tie - nothing picks a winner, so both are</text>
<text x="60" y="300" font-size="10.5" fill="#6B6862">kept and the read stays a multimapper (MAPQ 0, NH:2).</text>

<text x="360" y="336" font-size="15" font-weight="600" text-anchor="middle" fill="#111111">SOLE_TX (multi-locus) &#183; no winner, stays multimapped</text>
</svg>
