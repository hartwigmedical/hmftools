<svg viewBox="0 0 1040 484" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Step 3: merge supplementary record to primary</title>
<desc>Exon 1 here is a novel exon (shown in a deeper blue): it is absent from every transcript contig, so Step 1 cannot translate the read as a single spliced record and bwa instead emits it as two genome records - a short-anchor supplementary (20M in novel exon 1, rest clipped) and a primary (head clipped, 131M in exon 2), complementary across a 166 bp intron. tars merges them into one spliced primary 20M 166N 131M and drops the supplementary; the merged MAPQ is max(primary, supplementary), bumped to 60 when the primary+supplementary pair maps to a single locus. Being novel the junction has no annotated boundary, so it resolves to a canonical GT-AG splice motif - the zoom shows a junction placed 1 bp off being slid onto the motif.</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* novel exon (not in any transcript contig) - a visibly deeper blue than the pale annotated exon */
  --novel-exon:#6E9FD4; --novel-exon-line:#2F6FA8;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="1040" height="484" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(302,0)">
<rect x="556" y="14" width="152" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="26" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="35" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="42" width="20" height="11" rx="2" fill="var(--warn)"/>
<text x="592" y="51" font-size="10" fill="var(--label)">softclip (S)</text>
<line x1="566" y1="68" x2="586" y2="68" stroke="var(--tx)" stroke-width="2"/>
<text x="592" y="71" font-size="10" fill="var(--label)">intron (N)</text>
</g>

<!-- BEFORE -->
<text x="60" y="30" font-size="14" font-weight="600" fill="var(--tx-dark)">before  &#183;  two records for one read</text>

<!-- reference genome strip -->
<text x="60" y="52" font-size="10" fill="var(--sub)">reference genome  &#183;  chr22</text>
<rect x="60" y="58" width="96" height="13" rx="2" fill="var(--novel-exon)" stroke="var(--novel-exon-line)"/>
<line x1="156" y1="64" x2="306" y2="64" stroke="var(--line)" stroke-width="1.6"/>
<rect x="306" y="58" width="430" height="13" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="108" y="68" font-size="9" text-anchor="middle" fill="#FFFFFF" font-weight="600">novel exon 1</text>
<text x="521" y="68" font-size="9" text-anchor="middle" fill="var(--tx-dark)">exon 2</text>
<text x="231" y="82" font-size="9" text-anchor="middle" fill="var(--muted)">166 bp intron</text>

<!-- supplementary record: 20M aligned on exon 1, 131S softclipped at its inner end -->
<text x="60" y="104" font-size="10" fill="var(--sub)">supplementary  &#183;  20M anchors in novel exon 1, the rest is clipped</text>
<rect x="60" y="108" width="96" height="18" rx="3" fill="var(--tx)"/>
<text x="108" y="121" font-size="10.5" text-anchor="middle" fill="var(--bg)">20M</text>
<rect x="156" y="108" width="90" height="18" rx="3" fill="var(--warn)"/>
<text x="201" y="121" font-size="9" text-anchor="middle" fill="var(--warn-dark)">131S</text>

<!-- primary record: 131M aligned on exon 2, 20S softclipped at its inner end -->
<text x="60" y="148" font-size="10" fill="var(--sub)">primary  &#183;  head clipped, 131M anchors in exon 2</text>
<rect x="254" y="152" width="52" height="18" rx="3" fill="var(--warn)"/>
<text x="280" y="165" font-size="9" text-anchor="middle" fill="var(--warn-dark)">20S</text>
<rect x="306" y="152" width="430" height="18" rx="3" fill="var(--tx)"/>
<text x="521" y="165" font-size="10.5" text-anchor="middle" fill="var(--bg)">131M</text>

<!-- condition -->
<text x="60" y="196" font-size="11" fill="var(--sub)">anchors are complementary; <tspan fill="var(--keep)">merge once the novel junction resolves to a splice motif</tspan></text>

<!-- arrow -->
<line x1="100" y1="206" x2="100" y2="232" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- AFTER -->
<text x="60" y="250" font-size="14" font-weight="600" fill="var(--tx-dark)">after  &#183;  one spliced primary, supplementary dropped</text>
<rect x="60" y="262" width="96" height="18" rx="3" fill="var(--tx)"/>
<text x="108" y="275" font-size="10.5" text-anchor="middle" fill="var(--bg)">20M</text>
<line x1="156" y1="271" x2="206" y2="271" stroke="var(--tx)" stroke-width="2"/>
<line x1="256" y1="271" x2="306" y2="271" stroke="var(--tx)" stroke-width="2"/>
<text x="231" y="275" font-size="10" text-anchor="middle" fill="var(--tx-dark)">166N</text>
<rect x="306" y="262" width="430" height="18" rx="3" fill="var(--tx)"/>
<text x="521" y="275" font-size="10.5" text-anchor="middle" fill="var(--bg)">131M</text>
<rect x="760" y="261" width="72" height="20" rx="10" fill="var(--keep-soft)" stroke="var(--keep)"/>
<text x="796" y="275" font-size="10.5" text-anchor="middle" fill="var(--keep-dark)">MAPQ 60</text>
<text x="796" y="292" font-size="8" text-anchor="middle" fill="var(--keep-dark)">pair maps uniquely</text>

<!-- ================= zoom inset: junction snap onto motif ================= -->
<line x1="60" y1="304" x2="980" y2="304" stroke="var(--border)" stroke-width="1"/>
<text x="60" y="322" class="sub">zoom  &#183;  if the merged junction lands off the boundary, the snap slides it onto the canonical GT-AG motif</text>

<!-- donor / acceptor column labels -->
<text x="162" y="348" font-size="11" text-anchor="middle" fill="var(--sub)">donor (exon 1 | intron)</text>
<text x="560" y="348" font-size="11" text-anchor="middle" fill="var(--sub)">acceptor (intron | exon 2)</text>
<text x="30"  y="373" font-size="11" fill="var(--muted)">before</text>
<text x="30"  y="417" font-size="11" font-weight="600" fill="var(--tx-dark)">after</text>

<!-- BEFORE donor: boundary off the motif -->
<rect x="72"  y="356" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="102" y="356" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="132" y="356" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="162" y="356" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="192" y="356" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="222" y="356" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<line x1="132" y1="352" x2="132" y2="386" stroke="var(--tx-dark)" stroke-width="2.5"/>
<text x="87"  y="374" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">T</text>
<text x="117" y="374" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">C</text>
<text x="147" y="374" font-size="14" text-anchor="middle" fill="var(--muted)" font-family="Courier New, monospace">C</text>
<text x="177" y="374" font-size="14" text-anchor="middle" fill="var(--muted)" font-family="Courier New, monospace">G</text>
<text x="207" y="374" font-size="14" text-anchor="middle" fill="var(--muted)" font-family="Courier New, monospace">T</text>
<text x="237" y="374" font-size="14" text-anchor="middle" fill="var(--muted)" font-family="Courier New, monospace">G</text>

<!-- BEFORE acceptor -->
<rect x="470" y="356" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="500" y="356" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="530" y="356" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="560" y="356" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="590" y="356" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="620" y="356" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<line x1="530" y1="352" x2="530" y2="386" stroke="var(--tx-dark)" stroke-width="2.5"/>
<text x="485" y="374" font-size="14" text-anchor="middle" fill="var(--muted)" font-family="Courier New, monospace">T</text>
<text x="515" y="374" font-size="14" text-anchor="middle" fill="var(--muted)" font-family="Courier New, monospace">A</text>
<text x="545" y="374" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">G</text>
<text x="575" y="374" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">T</text>
<text x="605" y="374" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">C</text>
<text x="635" y="374" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">G</text>
<text x="662" y="374" font-size="11" fill="var(--muted)">CG..TA</text>

<!-- AFTER donor: boundary slid 1 right onto the motif -->
<rect x="72"  y="400" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="102" y="400" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="132" y="400" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="162" y="400" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="192" y="400" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="222" y="400" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="162" y="400" width="60" height="26" fill="none" stroke="var(--keep)" stroke-width="1.8"/>
<line x1="162" y1="396" x2="162" y2="430" stroke="var(--tx-dark)" stroke-width="2.5"/>
<text x="87"  y="418" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">T</text>
<text x="117" y="418" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">C</text>
<text x="147" y="418" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">C</text>
<text x="177" y="418" font-size="14" text-anchor="middle" fill="var(--keep)" font-family="Courier New, monospace">G</text>
<text x="207" y="418" font-size="14" text-anchor="middle" fill="var(--keep)" font-family="Courier New, monospace">T</text>
<text x="237" y="418" font-size="14" text-anchor="middle" fill="var(--muted)" font-family="Courier New, monospace">G</text>

<!-- AFTER acceptor -->
<rect x="470" y="400" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="500" y="400" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="530" y="400" width="30" height="26" fill="var(--panel3)" stroke="var(--border2)"/>
<rect x="560" y="400" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="590" y="400" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="620" y="400" width="30" height="26" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="500" y="400" width="60" height="26" fill="none" stroke="var(--keep)" stroke-width="1.8"/>
<line x1="560" y1="396" x2="560" y2="430" stroke="var(--tx-dark)" stroke-width="2.5"/>
<text x="485" y="418" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">T</text>
<text x="515" y="418" font-size="14" text-anchor="middle" fill="var(--keep)" font-family="Courier New, monospace">A</text>
<text x="545" y="418" font-size="14" text-anchor="middle" fill="var(--keep)" font-family="Courier New, monospace">G</text>
<text x="575" y="418" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">T</text>
<text x="605" y="418" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">C</text>
<text x="635" y="418" font-size="14" text-anchor="middle" fill="var(--ink)" font-family="Courier New, monospace">G</text>
<text x="662" y="418" font-size="11" font-weight="600" fill="var(--keep)">GT..AG</text>

<!-- CIGAR before/after (junction position moves; cigar length unchanged) -->
<text x="60"  y="454" font-size="11" fill="var(--sub)">before</text>
<text x="120" y="454" font-size="13" fill="var(--ink)" font-family="Courier New, monospace">20M 166N 131M</text>
<text x="420" y="454" font-size="10.5" fill="var(--muted)">junction 1 bp off the motif</text>
<text x="60"  y="474" font-size="11" font-weight="600" fill="var(--tx-dark)">after</text>
<text x="120" y="474" font-size="13" fill="var(--keep-dark)" font-family="Courier New, monospace">20M 166N 131M</text>
<text x="420" y="474" font-size="10.5" fill="var(--keep)">snapped onto GT..AG</text>
</svg>
