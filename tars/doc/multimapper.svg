<svg viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>MULTIMAPPER - best-score locus kept, rest in XA</title>
<desc>The read maps to several loci carrying both ref and tx alignments, with no clean splice signal to favour tx. One locus (chr11) is the single best score, so the read resolves there and the lower-scoring alts stay in the XA tag. When one locus is clearly best, MAPQ rescues to 60 (NH 1); a genuine multi-best-locus read instead stays MAPQ 0.</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="880" height="380" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="158" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="39" font-size="10" fill="var(--label)">best score (kept)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="var(--tx-soft)"/>
<text x="592" y="55" font-size="10" fill="var(--label)">lower-score alt (XA)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="var(--warn)"/>
<text x="592" y="71" font-size="10" fill="var(--label)">softclip (S)</text>
</g>

<!-- BEFORE -->
<text x="60" y="40" font-size="14" font-weight="600" fill="var(--tx-dark)">before &#183; candidate loci (bwa primary + XA), both ref and tx, no splice signal</text>

<!-- chr11 best -->
<text x="60" y="71" font-size="10.5" fill="var(--tx-dark)" font-family="Courier New, monospace">chr11:67226439</text>
<rect x="200" y="58" width="302" height="18" rx="3" fill="var(--tx)" stroke="var(--keep)" stroke-width="2"/>
<text x="351" y="71" font-size="10" text-anchor="middle" fill="var(--bg)">151M</text>
<text x="512" y="71" font-size="10" fill="var(--keep-dark)">NM:2  &#9664; single best</text>

<!-- chr14 -->
<text x="60" y="99" font-size="10.5" fill="var(--sub)" font-family="Courier New, monospace">chr14:97933211</text>
<rect x="200" y="86" width="302" height="18" rx="3" fill="var(--tx-soft)"/>
<text x="351" y="99" font-size="10" text-anchor="middle" fill="var(--tx-deep)">151M</text>
<text x="512" y="99" font-size="10" fill="var(--muted)">NM:6</text>

<!-- chr4 -->
<text x="60" y="127" font-size="10.5" fill="var(--sub)" font-family="Courier New, monospace">chr4:2522738</text>
<rect x="200" y="114" width="302" height="18" rx="3" fill="var(--tx-soft)"/>
<text x="351" y="127" font-size="10" text-anchor="middle" fill="var(--tx-deep)">134M1D17M</text>
<text x="512" y="127" font-size="10" fill="var(--muted)">NM:7</text>

<!-- chr6 -->
<text x="60" y="155" font-size="10.5" fill="var(--sub)" font-family="Courier New, monospace">chr6:167947330</text>
<rect x="200" y="142" width="276" height="18" rx="3" fill="var(--tx-soft)"/>
<text x="338" y="155" font-size="10" text-anchor="middle" fill="var(--tx-deep)">138M</text>
<rect x="476" y="142" width="26" height="18" rx="3" fill="var(--warn)"/>
<text x="489" y="155" font-size="8" text-anchor="middle" fill="var(--warn-dark)">13S</text>
<text x="512" y="155" font-size="10" fill="var(--muted)">NM:4</text>

<!-- chr17 -->
<text x="60" y="183" font-size="10.5" fill="var(--sub)" font-family="Courier New, monospace">chr17:17198158</text>
<rect x="200" y="170" width="276" height="18" rx="3" fill="var(--tx-soft)"/>
<text x="338" y="183" font-size="10" text-anchor="middle" fill="var(--tx-deep)">138M</text>
<rect x="476" y="170" width="26" height="18" rx="3" fill="var(--warn)"/>
<text x="489" y="183" font-size="8" text-anchor="middle" fill="var(--warn-dark)">13S</text>
<text x="512" y="183" font-size="10" fill="var(--muted)">NM:5</text>

<!-- AFTER -->
<text x="60" y="232" font-size="14" font-weight="600" fill="var(--tx-dark)">after &#183; best locus resolved, lower-score alts kept in XA</text>
<text x="60" y="263" font-size="10.5" fill="var(--tx-dark)" font-family="Courier New, monospace">chr11:67226439</text>
<rect x="200" y="250" width="302" height="20" rx="3" fill="var(--tx)"/>
<text x="351" y="264" font-size="10.5" text-anchor="middle" fill="var(--bg)">151M</text>
<rect x="560" y="250" width="62" height="20" rx="10" fill="var(--keep-soft)" stroke="var(--keep)"/>
<text x="591" y="264" font-size="11" text-anchor="middle" fill="var(--keep-dark)">MAPQ 60</text>
<text x="60" y="292" font-size="10.5" fill="var(--sub)">single best score, so it resolves to chr11 (NH:1, MAPQ rescued 0 &#8594; 60); the rest ride along in XA. A genuine</text>
<text x="60" y="308" font-size="10.5" fill="var(--sub)">multi-best-locus read instead keeps MAPQ 0 / NH &gt; 1.</text>

<text x="360" y="350" font-size="15" font-weight="600" text-anchor="middle" fill="var(--ink2)">MULTIMAPPER &#183; best-score locus kept, rest in XA</text>
</svg>
