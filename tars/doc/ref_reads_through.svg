<svg viewBox="0 0 880 450" xmlns="http://www.w3.org/2000/svg" role="img">
<title>REF_READS_THROUGH: ref wins over a fabricated tx gap</title>
<desc>At one locus, chr8:126,557,042, the tx alignment opens a 54 bp gap to reach an 8 bp far anchor (143M 54N 8M); the ref alt reads through contiguously as 151M with zero mismatches. The read's last 8 bases (GCGGCGGC) match the genome both at the contiguous position and at the downstream exon after the gap, so nothing breaks the tie. The contiguous no-gap read is more parsimonious, so tars keeps ref and drops the tx alt.</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="880" height="450" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="16" width="152" height="90" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="28" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="37" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="44" width="20" height="11" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="592" y="53" font-size="10" fill="var(--label)">exon (genome)</text>
<line x1="566" y1="71" x2="586" y2="71" stroke="var(--tx)" stroke-width="2"/>
<text x="592" y="74" font-size="10" fill="var(--label)">gap (N)</text>
<rect x="566" y="84" width="20" height="11" rx="2" fill="none" stroke="var(--keep)"/>
<text x="592" y="93" font-size="10" fill="var(--label)">8 bp anchor</text>
</g>

<!-- BEFORE -->
<text x="60" y="36" font-size="14" font-weight="600" fill="var(--tx-dark)">before &#183; two placements at one locus, chr8:126,557,042</text>

<text x="60" y="58" font-size="10.5" fill="var(--sub)">bwa primary (tx): an 8 bp far anchor across a fabricated 54 bp gap</text>
<rect x="60" y="64" width="429" height="20" rx="3" fill="var(--tx)"/>
<text x="274" y="78" font-size="11" text-anchor="middle" fill="var(--bg)">143M</text>
<line x1="489" y1="74" x2="494" y2="74" stroke="var(--tx)" stroke-width="2"/>
<line x1="520" y1="74" x2="525" y2="74" stroke="var(--tx)" stroke-width="2"/>
<text x="507" y="78" font-size="10" text-anchor="middle" fill="var(--tx-dark)">54N</text>
<rect x="525" y="64" width="24" height="20" rx="3" fill="var(--tx)" stroke="var(--keep)" stroke-width="1.5"/>
<text x="537" y="78" font-size="9" text-anchor="middle" fill="var(--bg)">8M</text>
<rect x="600" y="62" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="631" y="76" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 7</text>

<text x="60" y="108" font-size="10.5" fill="var(--sub)">ref alt (XA): reads through contiguously, no gap, zero mismatches</text>
<rect x="60" y="114" width="453" height="20" rx="3" fill="var(--tx)"/>
<text x="286" y="128" font-size="11" text-anchor="middle" fill="var(--bg)">151M</text>
<rect x="489" y="114" width="24" height="20" rx="3" fill="var(--tx)" stroke="var(--keep)" stroke-width="1.5"/>
<rect x="600" y="112" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="631" y="126" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 60</text>

<!-- REFERENCE GENOME -->
<text x="60" y="162" font-size="11" font-weight="600" fill="var(--sub)">reference genome &#183; chr8</text>
<rect x="60" y="170" width="453" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="489" y="170" width="24" height="14" fill="none" stroke="var(--keep)" stroke-width="1.5"/>
<line x1="513" y1="177" x2="537" y2="177" stroke="var(--line)" stroke-width="1.6"/>
<rect x="537" y="170" width="24" height="14" rx="2" fill="var(--keep-soft2)" stroke="var(--keep)" stroke-dasharray="3,2"/>
<text x="270" y="180" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon &#183; reads through contiguously</text>
<line x1="60" y1="184" x2="60" y2="193" stroke="var(--sub)" stroke-width="1.3"/>
<text x="60" y="206" font-size="10" text-anchor="middle" fill="var(--sub)">126,557,042</text>
<text x="501" y="206" font-size="9" text-anchor="middle" fill="var(--keep)">…185</text>
<text x="549" y="206" font-size="9" text-anchor="middle" fill="var(--keep)">…239</text>
<text x="549" y="166" font-size="9" text-anchor="middle" fill="var(--keep)">downstream exon</text>

<!-- base evidence -->
<rect x="60" y="222" width="602" height="74" rx="4" fill="var(--panel2)" stroke="var(--border3)"/>
<text x="74" y="240" font-size="10" fill="var(--sub)">the read's last 8 bases match the genome in both places - nothing distinguishes them:</text>
<text x="80"  y="260" font-size="12.5" fill="var(--sub)" font-family="Courier New, monospace">read[144..151]</text>
<text x="320" y="260" font-size="12.5" fill="var(--ink)" font-family="Courier New, monospace">GCGGCGGC</text>
<text x="80"  y="277" font-size="12.5" fill="var(--sub)" font-family="Courier New, monospace">chr8:126,557,185  (contiguous)</text>
<text x="320" y="277" font-size="12.5" fill="var(--keep)" font-family="Courier New, monospace">GCGGCGGC</text>
<text x="440" y="277" font-size="11" fill="var(--keep)" font-family="Courier New, monospace">match</text>
<text x="80"  y="294" font-size="12.5" fill="var(--sub)" font-family="Courier New, monospace">chr8:126,557,239  (after 54 bp gap)</text>
<text x="320" y="294" font-size="12.5" fill="var(--keep)" font-family="Courier New, monospace">GCGGCGGC</text>
<text x="440" y="294" font-size="11" fill="var(--keep)" font-family="Courier New, monospace">match</text>

<!-- AFTER -->
<text x="60" y="322" font-size="14" font-weight="600" fill="var(--tx-dark)">after &#183; ref kept, tx alt dropped</text>
<rect x="60" y="336" width="453" height="20" rx="3" fill="var(--tx)"/>
<text x="286" y="350" font-size="11" text-anchor="middle" fill="var(--bg)">151M</text>
<rect x="600" y="334" width="62" height="22" rx="11" fill="var(--keep-soft)" stroke="var(--keep)"/>
<text x="631" y="349" font-size="11" text-anchor="middle" fill="var(--keep-dark)">MAPQ 60</text>
<text x="60" y="382" font-size="10.5" fill="var(--sub)">both explain the read with zero mismatches; the no-gap read is more parsimonious, so ref wins (NH 1)</text>
<text x="60" y="398" font-size="9.5" fill="var(--muted)">shape-based rule (RefFullMatch beats TxHasN); it does not compare mismatch counts</text>

<text x="360" y="428" font-size="15" font-weight="600" text-anchor="middle" fill="var(--ink2)">ref wins &#183; the genome reads through a gap the tx fabricated</text>
</svg>
