<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Swap (JUNCTION_OVER_CONTIGUOUS): spliced placement beats a contiguous one</title>
<desc>bwa picks a contiguous 151M placement on chr2:128,518,864 as primary; a transcript alignment on chr9:86,266,119 spans a real 5,815 bp junction (73M 5815N 78M) but bwa demoted it to XA. tars swaps the primary to the spliced chr9 placement, keeps the displaced chr2 placement in XA, drops the lower-scoring chr5 ref alt, and rescues MAPQ 0 to 60.</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="880" height="470" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="16" width="152" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="28" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="37" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="44" width="20" height="11" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="592" y="53" font-size="10" fill="var(--label)">exon (genome)</text>
<line x1="566" y1="71" x2="586" y2="71" stroke="var(--tx)" stroke-width="2"/>
<text x="592" y="74" font-size="10" fill="var(--label)">intron (N)</text>
</g>

<text x="60" y="36" font-size="14" font-weight="600" fill="var(--tx-dark)">before &#183; bwa's primary is the contiguous chr2 placement</text>

<!-- chr2 locus: contiguous -->
<text x="60" y="58" font-size="10.5" fill="var(--sub)">chr2:128,518,864 - bwa primary: contiguous 151M, no junction (a coincidental match at another locus)</text>
<text x="60" y="78" font-size="9.5" fill="var(--sub)">reference genome &#183; chr2</text>
<rect x="60" y="84" width="453" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="286" y="94" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">single exon &#183; no intron here</text>
<rect x="60" y="102" width="453" height="20" rx="3" fill="var(--tx)"/>
<text x="286" y="116" font-size="11" text-anchor="middle" fill="var(--bg)">151M</text>
<rect x="560" y="100" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="591" y="114" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 0</text>

<!-- chr9 locus: spliced (demoted to XA) -->
<text x="60" y="156" font-size="10.5" fill="var(--sub)">chr9:86,266,119 - tx alignment: spans a real 5,815 bp junction (bwa demoted it to XA)</text>
<text x="60" y="176" font-size="9.5" fill="var(--sub)">reference genome &#183; chr9</text>
<rect x="60" y="182" width="190" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<line x1="250" y1="189" x2="330" y2="189" stroke="var(--line)" stroke-width="1.6"/>
<rect x="330" y="182" width="203" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="155" y="192" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon</text>
<text x="431" y="192" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">next exon</text>
<rect x="60" y="200" width="190" height="20" rx="3" fill="var(--tx)"/>
<text x="155" y="214" font-size="11" text-anchor="middle" fill="var(--bg)">73M</text>
<line x1="250" y1="210" x2="268" y2="210" stroke="var(--tx)" stroke-width="2"/>
<line x1="312" y1="210" x2="330" y2="210" stroke="var(--tx)" stroke-width="2"/>
<text x="290" y="214" font-size="10" text-anchor="middle" fill="var(--tx-dark)">5815N</text>
<rect x="330" y="200" width="203" height="20" rx="3" fill="var(--tx)"/>
<text x="431" y="214" font-size="11" text-anchor="middle" fill="var(--bg)">78M</text>

<!-- AFTER -->
<text x="60" y="300" font-size="14" font-weight="600" fill="var(--tx-dark)">after &#183; primary swapped to the spliced chr9 placement</text>
<rect x="60" y="318" width="190" height="20" rx="3" fill="var(--tx)"/>
<text x="155" y="332" font-size="11" text-anchor="middle" fill="var(--bg)">73M</text>
<line x1="250" y1="328" x2="268" y2="328" stroke="var(--tx)" stroke-width="2"/>
<line x1="312" y1="328" x2="330" y2="328" stroke="var(--tx)" stroke-width="2"/>
<text x="290" y="332" font-size="10" text-anchor="middle" fill="var(--tx-dark)">5815N</text>
<rect x="330" y="318" width="203" height="20" rx="3" fill="var(--tx)"/>
<text x="431" y="332" font-size="11" text-anchor="middle" fill="var(--bg)">78M</text>
<rect x="560" y="316" width="62" height="22" rx="11" fill="var(--keep-soft)" stroke="var(--keep)"/>
<text x="591" y="331" font-size="11" text-anchor="middle" fill="var(--keep-dark)">MAPQ 60</text>

<rect x="60" y="356" width="350" height="22" rx="4" fill="var(--panel2)" stroke="var(--border3)"/>
<text x="72" y="371" font-size="11" fill="var(--label)" font-family="Courier New, monospace">XA: chr2,+128518864,151M,0</text>
<text x="424" y="371" font-size="10" fill="var(--sub)">displaced chr2 placement kept in XA (chr5 alt dropped)</text>
<text x="60" y="400" font-size="10.5" fill="var(--sub)">a junction across a real intron is stronger evidence than a contiguous match at an unrelated locus (NH 1)</text>

</svg>
