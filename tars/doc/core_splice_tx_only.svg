<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Core splice (tx-only), MAPQ 0 to 60</title>
<desc>A read aligns to the transcriptome as 151M (three packed copies), all tied at MAPQ 0. Translation lifts it across a 7,762 bp intron to a single spliced genomic locus chr22:45,923,222 as 114M 7762N 37M; the redundant copies collapse to one locus and MAPQ is rescued from 0 to 60 (NH 1).</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="880" height="400" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="150" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="39" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="592" y="55" font-size="10" fill="var(--label)">exon (genome)</text>
<line x1="566" y1="73" x2="586" y2="73" stroke="var(--tx)" stroke-width="2"/>
<text x="592" y="76" font-size="10" fill="var(--label)">intron (N)</text>
</g>

<!-- BEFORE: 3 tied isoform contigs -->
<text x="60" y="36" font-size="14" font-weight="600" fill="var(--tx-dark)">before &#183; read aligns to the transcriptome (3 packed copies, all tied)</text>
<rect x="60" y="48" width="438" height="13" rx="2" fill="var(--tx)"/>
<text x="279" y="58" font-size="9.5" text-anchor="middle" fill="var(--bg)">151M  &#183; chr22_tx:8,725,640</text>
<rect x="60" y="64" width="438" height="13" rx="2" fill="var(--tx-soft)"/>
<text x="279" y="74" font-size="9" text-anchor="middle" fill="var(--tx-deep)">151M  &#183; copy 2 (XA, NM 0)</text>
<rect x="60" y="80" width="438" height="13" rx="2" fill="var(--tx-soft)"/>
<text x="279" y="90" font-size="9" text-anchor="middle" fill="var(--tx-deep)">151M  &#183; copy 3 (XA, NM 0)</text>
<rect x="516" y="46" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="547" y="60" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 0</text>
<text x="60" y="108" font-size="10" fill="var(--sub)">no single best hit (all copies score equally) so bwa emits MAPQ 0</text>

<!-- arrow -->
<line x1="120" y1="120" x2="120" y2="152" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#arr)"/>
<text x="134" y="140" font-size="11" fill="var(--sub)">translate across the intron &#183; copies collapse to one locus</text>

<!-- REFERENCE GENOME -->
<text x="60" y="180" font-size="11" font-weight="600" fill="var(--sub)">reference genome &#183; chr22</text>
<rect x="60" y="188" width="331" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="470" y="188" width="107" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<line x1="391" y1="195" x2="470" y2="195" stroke="var(--line)" stroke-width="1.6"/>
<text x="225" y="198" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon</text>
<text x="523" y="198" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon</text>
<line x1="60" y1="202" x2="60" y2="211" stroke="var(--sub)" stroke-width="1.3"/>
<text x="60" y="224" font-size="10" text-anchor="middle" fill="var(--sub)">45,923,222</text>
<text x="430" y="185" font-size="9.5" text-anchor="middle" fill="var(--muted)">7,762 bp (not to scale)</text>

<!-- AFTER: single spliced placement -->
<text x="60" y="258" font-size="14" font-weight="600" fill="var(--tx-dark)">after &#183; one spliced genomic placement</text>
<rect x="60" y="272" width="331" height="20" rx="3" fill="var(--tx)"/>
<text x="225" y="286" font-size="11" text-anchor="middle" fill="var(--bg)">114M</text>
<line x1="391" y1="282" x2="408" y2="282" stroke="var(--tx)" stroke-width="2"/>
<line x1="452" y1="282" x2="470" y2="282" stroke="var(--tx)" stroke-width="2"/>
<text x="430" y="286" font-size="11" text-anchor="middle" fill="var(--tx-dark)">7762N</text>
<rect x="470" y="272" width="107" height="20" rx="3" fill="var(--tx)"/>
<text x="523" y="286" font-size="11" text-anchor="middle" fill="var(--bg)">37M</text>
<rect x="600" y="270" width="62" height="22" rx="11" fill="var(--keep-soft)" stroke="var(--keep)"/>
<text x="631" y="285" font-size="11" text-anchor="middle" fill="var(--keep-dark)">MAPQ 60</text>
<text x="60" y="310" font-size="9.5" fill="var(--muted)">MAPQ bumped to 60 = liftback asserting a rescue (single best genomic locus)</text>

</svg>
