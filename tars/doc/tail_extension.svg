<svg viewBox="0 0 880 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<title>Step 2: reclaim a trimmed tail</title>
<desc>A terminal softclip is walked into the contiguous genome and re-scored. The best-scoring prefix (at least tail_min_extension, up to tail_max_extension) is turned from softclip (S) into matched (M): 131M 20S becomes 151M when the whole clip matches, or 139M 12S when only 8 bp match. CIGAR only, MAPQ unchanged. A walk that stalls where an annotated intron begins is left for rescue.</desc>
<defs>
<marker id="arrE" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/></marker>
</defs>
<rect x="0" y="0" width="880" height="300" fill="#FFFFFF"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="152" height="74" rx="4" fill="#FCFCFB" stroke="#E4E2DD"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="#2F7DC6"/>
<text x="592" y="39" font-size="10" fill="#5C5953">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="#EFB94B"/>
<text x="592" y="55" font-size="10" fill="#5C5953">softclip (S)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="#EAF6EE" stroke="#1F8A4C"/>
<text x="592" y="71" font-size="10" fill="#5C5953">reclaimed</text>
</g>

<!-- BEFORE -->
<text x="60" y="34" font-size="14" font-weight="600" fill="#0C447C">before  &#183;  terminal softclip</text>
<rect x="60" y="46" width="393" height="20" rx="3" fill="#2F7DC6"/>
<text x="256" y="60" font-size="11" text-anchor="middle" fill="#FFFFFF">131M</text>
<rect x="453" y="46" width="60" height="20" rx="3" fill="#EFB94B"/>
<text x="483" y="60" font-size="11" text-anchor="middle" fill="#6B4E04">20S</text>
<text x="60" y="84" font-size="10.5" fill="#6B6862">the softclip is at least 3 bp (tail_min_softclip), so it is re-checked against the genome</text>

<!-- REFERENCE GENOME -->
<text x="60" y="112" font-size="11" font-weight="600" fill="#6B6862">reference genome  &#183;  chr16</text>
<rect x="60" y="120" width="393" height="14" rx="2" fill="#E6F1FB" stroke="#4A90C4"/>
<rect x="453" y="120" width="60" height="14" rx="2" fill="#EAF6EE" stroke="#1F8A4C"/>
<text x="256" y="130" font-size="9.5" text-anchor="middle" fill="#0C447C">exon</text>
<text x="483" y="130" font-size="8.5" text-anchor="middle" fill="#1F8A4C">clip matches</text>

<!-- decision -->
<text x="60" y="162" font-size="11" fill="#6B6862">walk the clip into the contiguous genome: <tspan fill="#1F8A4C">the best-scoring prefix (3 to 30 bp) becomes M</tspan></text>

<!-- arrow -->
<line x1="100" y1="176" x2="100" y2="202" stroke="#9B9893" stroke-width="1.4" marker-end="url(#arrE)"/>

<!-- AFTER -->
<text x="60" y="228" font-size="14" font-weight="600" fill="#0C447C">after  &#183;  read's CIGAR updated to 151M</text>
<rect x="60" y="240" width="393" height="20" rx="3" fill="#2F7DC6"/>
<rect x="453" y="240" width="60" height="20" rx="3" fill="#3F9A5E"/>
<text x="286" y="254" font-size="11" text-anchor="middle" fill="#FFFFFF">151M</text>
<text x="60" y="280" font-size="9.5" fill="#9B9893">CIGAR only; MAPQ unchanged. Partial match -> the rest stays clipped (e.g. 139M 12S).</text>
</svg>
