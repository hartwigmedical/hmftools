<svg viewBox="0 0 880 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Step 2: reclaim a trimmed tail</title>
<desc>A terminal softclip is walked into the contiguous genome and re-scored. The best-scoring prefix (at least tail_min_extension, up to tail_max_extension) is turned from softclip (S) into matched (M): 131M 20S becomes 151M when the whole clip matches, or 139M 12S when only 8 bp match. CIGAR only, MAPQ unchanged. A walk that stalls where an annotated intron begins is left for rescue.</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="880" height="300" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="152" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="39" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="var(--warn)"/>
<text x="592" y="55" font-size="10" fill="var(--label)">softclip (S)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="var(--keep-soft2)" stroke="var(--keep)"/>
<text x="592" y="71" font-size="10" fill="var(--label)">reclaimed</text>
</g>

<!-- BEFORE -->
<text x="60" y="34" font-size="14" font-weight="600" fill="var(--tx-dark)">before  &#183;  terminal softclip</text>
<rect x="60" y="46" width="393" height="20" rx="3" fill="var(--tx)"/>
<text x="256" y="60" font-size="11" text-anchor="middle" fill="var(--bg)">131M</text>
<rect x="453" y="46" width="60" height="20" rx="3" fill="var(--warn)"/>
<text x="483" y="60" font-size="11" text-anchor="middle" fill="var(--warn-dark)">20S</text>
<text x="60" y="84" font-size="10.5" fill="var(--sub)">the softclip is at least 3 bp (tail_min_softclip), so it is re-checked against the genome</text>

<!-- REFERENCE GENOME -->
<text x="60" y="112" font-size="11" font-weight="600" fill="var(--sub)">reference genome  &#183;  chr16</text>
<rect x="60" y="120" width="393" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="453" y="120" width="60" height="14" rx="2" fill="var(--keep-soft2)" stroke="var(--keep)"/>
<text x="256" y="130" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon</text>
<text x="483" y="130" font-size="8.5" text-anchor="middle" fill="var(--keep)">clip matches</text>

<!-- decision -->
<text x="60" y="162" font-size="11" fill="var(--sub)">walk the clip into the contiguous genome: <tspan fill="var(--keep)">the best-scoring prefix (3 to 30 bp) becomes M</tspan></text>

<!-- arrow -->
<line x1="100" y1="176" x2="100" y2="202" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- AFTER -->
<text x="60" y="228" font-size="14" font-weight="600" fill="var(--tx-dark)">after  &#183;  read's CIGAR updated to 151M</text>
<rect x="60" y="240" width="393" height="20" rx="3" fill="var(--tx)"/>
<rect x="453" y="240" width="60" height="20" rx="3" fill="var(--keep-mid)"/>
<text x="286" y="254" font-size="11" text-anchor="middle" fill="var(--bg)">151M</text>
<text x="60" y="280" font-size="9.5" fill="var(--muted)">CIGAR only; MAPQ unchanged. Partial match -> the rest stays clipped (e.g. 139M 12S).</text>
</svg>
