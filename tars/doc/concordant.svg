<svg viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<title>CONCORDANT - ref and tx agree, drop the duplicate</title>
<desc>At an exon interior the read has both a ref placement and a same-locus tx alt with an identical 151M cigar and no junction either side. There is no real contest: the discriminator keeps the ref placement and drops the redundant tx alt. MAPQ is carried straight from bwa.</desc>
<rect x="0" y="0" width="880" height="360" fill="#FFFFFF"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="152" height="74" rx="4" fill="#FCFCFB" stroke="#E4E2DD"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="#2F7DC6"/>
<text x="592" y="39" font-size="10" fill="#5C5953">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="#A9CDEA"/>
<text x="592" y="55" font-size="10" fill="#5C5953">tx alt (dropped)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="#E6F1FB" stroke="#4A90C4"/>
<text x="592" y="71" font-size="10" fill="#5C5953">exon (genome)</text>
</g>

<!-- BEFORE -->
<text x="60" y="40" font-size="14" font-weight="600" fill="#0C447C">before &#183; ref + same-locus tx alt, identical cigar</text>
<rect x="60" y="56" width="453" height="20" rx="3" fill="#2F7DC6"/>
<text x="286" y="70" font-size="11" text-anchor="middle" fill="#FFFFFF">151M  (ref)</text>
<rect x="560" y="54" width="62" height="20" rx="10" fill="#ECECEA"/>
<text x="591" y="68" font-size="11" text-anchor="middle" fill="#5C5953">MAPQ 40</text>
<rect x="60" y="80" width="453" height="16" rx="3" fill="#A9CDEA"/>
<text x="286" y="92" font-size="10" text-anchor="middle" fill="#1C4F7C">151M  &#183; tx alt (chr19_tx) lifts to the same locus &amp; cigar</text>

<!-- REFERENCE GENOME -->
<text x="60" y="132" font-size="11" font-weight="600" fill="#6B6862">reference genome &#183; chr19 (exon interior - no junction either side)</text>
<rect x="60" y="140" width="453" height="14" rx="2" fill="#E6F1FB" stroke="#4A90C4"/>
<text x="286" y="150" font-size="9.5" text-anchor="middle" fill="#0C447C">exon</text>
<line x1="60" y1="154" x2="60" y2="163" stroke="#6B6862" stroke-width="1.3"/>
<text x="60" y="176" font-size="10" text-anchor="middle" fill="#6B6862">1,009,433</text>

<!-- AFTER -->
<text x="60" y="216" font-size="14" font-weight="600" fill="#0C447C">after &#183; ref kept, duplicate tx alt dropped</text>
<rect x="60" y="232" width="453" height="20" rx="3" fill="#2F7DC6"/>
<text x="286" y="246" font-size="11" text-anchor="middle" fill="#FFFFFF">151M</text>
<rect x="560" y="230" width="62" height="20" rx="10" fill="#ECECEA"/>
<text x="591" y="244" font-size="11" text-anchor="middle" fill="#5C5953">MAPQ 40</text>
<text x="60" y="268" font-size="10.5" fill="#6B6862">identical cigars, no junction = no contest: keep ref, drop the redundant tx alt (NH:1). MAPQ carried from bwa -</text>
<text x="60" y="284" font-size="10.5" fill="#6B6862">it saw two equal-score hits, not a MAPQ-0 tie, so no rescue bump.</text>

<text x="360" y="330" font-size="15" font-weight="600" text-anchor="middle" fill="#111111">CONCORDANT &#183; ref and tx agree, drop the duplicate</text>
</svg>
