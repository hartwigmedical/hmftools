<svg viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>CONCORDANT - ref and tx agree, drop the duplicate</title>
<desc>At an exon interior the read has both a ref placement and a same-locus tx alt with an identical 151M cigar and no junction either side. There is no real contest: the discriminator keeps the ref placement and drops the redundant tx alt. MAPQ is carried straight from bwa.</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="880" height="360" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="152" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="39" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="var(--tx-soft)"/>
<text x="592" y="55" font-size="10" fill="var(--label)">tx alt (dropped)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="592" y="71" font-size="10" fill="var(--label)">exon (genome)</text>
</g>

<!-- BEFORE -->
<text x="60" y="40" font-size="14" font-weight="600" fill="var(--tx-dark)">before &#183; ref + same-locus tx alt, identical cigar</text>
<rect x="60" y="56" width="453" height="20" rx="3" fill="var(--tx)"/>
<text x="286" y="70" font-size="11" text-anchor="middle" fill="var(--bg)">151M  (ref)</text>
<rect x="560" y="54" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="591" y="68" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 40</text>
<rect x="60" y="80" width="453" height="16" rx="3" fill="var(--tx-soft)"/>
<text x="286" y="92" font-size="10" text-anchor="middle" fill="var(--tx-deep)">151M  &#183; tx alt (chr19_tx) lifts to the same locus &amp; cigar</text>

<!-- REFERENCE GENOME -->
<text x="60" y="132" font-size="11" font-weight="600" fill="var(--sub)">reference genome &#183; chr19 (exon interior - no junction either side)</text>
<rect x="60" y="140" width="453" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="286" y="150" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon</text>
<line x1="60" y1="154" x2="60" y2="163" stroke="var(--sub)" stroke-width="1.3"/>
<text x="60" y="176" font-size="10" text-anchor="middle" fill="var(--sub)">1,009,433</text>

<!-- AFTER -->
<text x="60" y="216" font-size="14" font-weight="600" fill="var(--tx-dark)">after &#183; ref kept, duplicate tx alt dropped</text>
<rect x="60" y="232" width="453" height="20" rx="3" fill="var(--tx)"/>
<text x="286" y="246" font-size="11" text-anchor="middle" fill="var(--bg)">151M</text>
<rect x="560" y="230" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="591" y="244" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 40</text>
<text x="60" y="268" font-size="10.5" fill="var(--sub)">identical cigars, no junction = no contest: keep ref, drop the redundant tx alt (NH:1). MAPQ carried from bwa -</text>
<text x="60" y="284" font-size="10.5" fill="var(--sub)">it saw two equal-score hits, not a MAPQ-0 tie, so no rescue bump.</text>

<text x="360" y="330" font-size="15" font-weight="600" text-anchor="middle" fill="var(--ink2)">CONCORDANT &#183; ref and tx agree, drop the duplicate</text>
</svg>
