<svg viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AMBIGUOUS - no rule fires, bwa primary kept</title>
<desc>At one locus the read has a ref placement (151M) and a tx alt that softclips (126M 25S), but the clip is not at an annotated exon boundary. The shapes are not identical, there is no real junction, and the clip is not a boundary softclip, so no discriminator rule matches. bwa's primary (the ref) is kept unchanged.</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect x="0" y="0" width="880" height="360" fill="var(--bg)"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="152" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="39" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="var(--warn)"/>
<text x="592" y="55" font-size="10" fill="var(--label)">softclip (S)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="592" y="71" font-size="10" fill="var(--label)">exon (genome)</text>
</g>

<!-- BEFORE -->
<text x="60" y="40" font-size="14" font-weight="600" fill="var(--tx-dark)">before &#183; ref + tx alt at one locus, shapes fit no rule</text>
<text x="60" y="60" font-size="10.5" fill="var(--sub)">ref: reads through contiguously</text>
<rect x="60" y="66" width="453" height="20" rx="3" fill="var(--tx)"/>
<text x="286" y="80" font-size="11" text-anchor="middle" fill="var(--bg)">151M</text>
<rect x="560" y="64" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="591" y="78" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 60</text>
<text x="60" y="110" font-size="10.5" fill="var(--sub)">tx alt: softclips, but not at an exon boundary</text>
<rect x="60" y="116" width="378" height="20" rx="3" fill="var(--tx)"/>
<text x="249" y="130" font-size="11" text-anchor="middle" fill="var(--bg)">126M</text>
<rect x="438" y="116" width="75" height="20" rx="3" fill="var(--warn)"/>
<text x="475" y="130" font-size="10.5" text-anchor="middle" fill="var(--warn-dark)">25S</text>

<!-- REFERENCE GENOME -->
<text x="60" y="168" font-size="11" font-weight="600" fill="var(--sub)">reference genome &#183; chr2 (single exon spans the whole read)</text>
<rect x="60" y="176" width="453" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="286" y="186" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon</text>
<line x1="438" y1="172" x2="438" y2="200" stroke="var(--drop)" stroke-width="1.4" stroke-dasharray="3,2"/>
<text x="438" y="212" font-size="9.5" text-anchor="middle" fill="var(--drop)">tx clip falls mid-exon, not at a boundary</text>

<!-- AFTER -->
<text x="60" y="248" font-size="14" font-weight="600" fill="var(--tx-dark)">after &#183; bwa primary (ref) kept unchanged</text>
<rect x="60" y="264" width="453" height="20" rx="3" fill="var(--tx)"/>
<text x="286" y="278" font-size="11" text-anchor="middle" fill="var(--bg)">151M</text>
<rect x="560" y="262" width="62" height="20" rx="10" fill="var(--panel4)"/>
<text x="591" y="276" font-size="11" text-anchor="middle" fill="var(--label)">MAPQ 60</text>
<text x="60" y="300" font-size="10.5" fill="var(--sub)">not identical (not CONCORDANT), no real junction (not JUNCTION), clip not at a boundary - no rule fires, so bwa's pick stands (NH:1).</text>

<text x="360" y="336" font-size="15" font-weight="600" text-anchor="middle" fill="var(--ink2)">AMBIGUOUS &#183; no rule fires, bwa primary kept</text>
</svg>
