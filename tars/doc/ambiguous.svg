<svg viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<title>AMBIGUOUS - no rule fires, bwa primary kept</title>
<desc>At one locus the read has a ref placement (151M) and a tx alt that softclips (126M 25S), but the clip is not at an annotated exon boundary. The shapes are not identical, there is no real junction, and the clip is not a boundary softclip, so no discriminator rule matches. bwa's primary (the ref) is kept unchanged.</desc>
<rect x="0" y="0" width="880" height="360" fill="#FFFFFF"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="152" height="74" rx="4" fill="#FCFCFB" stroke="#E4E2DD"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="#2F7DC6"/>
<text x="592" y="39" font-size="10" fill="#5C5953">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="#EFB94B"/>
<text x="592" y="55" font-size="10" fill="#5C5953">softclip (S)</text>
<rect x="566" y="62" width="20" height="11" rx="2" fill="#E6F1FB" stroke="#4A90C4"/>
<text x="592" y="71" font-size="10" fill="#5C5953">exon (genome)</text>
</g>

<!-- BEFORE -->
<text x="60" y="40" font-size="14" font-weight="600" fill="#0C447C">before &#183; ref + tx alt at one locus, shapes fit no rule</text>
<text x="60" y="60" font-size="10.5" fill="#6B6862">ref: reads through contiguously</text>
<rect x="60" y="66" width="453" height="20" rx="3" fill="#2F7DC6"/>
<text x="286" y="80" font-size="11" text-anchor="middle" fill="#FFFFFF">151M</text>
<rect x="560" y="64" width="62" height="20" rx="10" fill="#ECECEA"/>
<text x="591" y="78" font-size="11" text-anchor="middle" fill="#5C5953">MAPQ 60</text>
<text x="60" y="110" font-size="10.5" fill="#6B6862">tx alt: softclips, but not at an exon boundary</text>
<rect x="60" y="116" width="378" height="20" rx="3" fill="#2F7DC6"/>
<text x="249" y="130" font-size="11" text-anchor="middle" fill="#FFFFFF">126M</text>
<rect x="438" y="116" width="75" height="20" rx="3" fill="#EFB94B"/>
<text x="475" y="130" font-size="10.5" text-anchor="middle" fill="#6B4E04">25S</text>

<!-- REFERENCE GENOME -->
<text x="60" y="168" font-size="11" font-weight="600" fill="#6B6862">reference genome &#183; chr2 (single exon spans the whole read)</text>
<rect x="60" y="176" width="453" height="14" rx="2" fill="#E6F1FB" stroke="#4A90C4"/>
<text x="286" y="186" font-size="9.5" text-anchor="middle" fill="#0C447C">exon</text>
<line x1="438" y1="172" x2="438" y2="200" stroke="#C0392B" stroke-width="1.4" stroke-dasharray="3,2"/>
<text x="438" y="212" font-size="9.5" text-anchor="middle" fill="#C0392B">tx clip falls mid-exon, not at a boundary</text>

<!-- AFTER -->
<text x="60" y="248" font-size="14" font-weight="600" fill="#0C447C">after &#183; bwa primary (ref) kept unchanged</text>
<rect x="60" y="264" width="453" height="20" rx="3" fill="#2F7DC6"/>
<text x="286" y="278" font-size="11" text-anchor="middle" fill="#FFFFFF">151M</text>
<rect x="560" y="262" width="62" height="20" rx="10" fill="#ECECEA"/>
<text x="591" y="276" font-size="11" text-anchor="middle" fill="#5C5953">MAPQ 60</text>
<text x="60" y="300" font-size="10.5" fill="#6B6862">not identical (not CONCORDANT), no real junction (not JUNCTION), clip not at a boundary - no rule fires, so bwa's pick stands (NH:1).</text>

<text x="360" y="336" font-size="15" font-weight="600" text-anchor="middle" fill="#111111">AMBIGUOUS &#183; no rule fires, bwa primary kept</text>
</svg>
