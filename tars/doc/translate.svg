<svg viewBox="0 0 880 372" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Step 0: translate the transcript CIGAR to genome</title>
<desc>A read aligns to the transcriptome as 151M, where two exons are packed adjacent; it is walked through the exon boundary and an N is inserted where the read crosses it, giving the spliced genomic CIGAR 90M 5000N 61M. CIGAR transform only.</desc>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
svg {
  /* transcript / matched */
  --tx:#2F7DC6; --tx-dark:#0C447C; --tx-deep:#1C4F7C; --tx-soft:#A9CDEA;
  --exon:#E6F1FB; --exon-line:#4A90C4;
  /* kept / genomic-good */
  --keep:#1F8A4C; --keep-dark:#166534; --keep-mid:#3F9A5E; --keep-soft:#E3F2E8; --keep-soft2:#EAF6EE;
  /* softclip / caution */
  --warn:#EFB94B; --warn-line:#D89B14; --warn-dark:#6B4E04; --warn-dark2:#7A4F01; --warn-soft:#FBEFD0;
  /* boundary / dropped */
  --drop:#C0392B; --drop-soft:#FBE3E0;
  /* supplementary */
  --supp:#B07CC6;
  /* neutrals */
  --ink:#333333; --ink2:#111111; --sub:#6B6862; --label:#5C5953; --muted:#9B9893;
  --line:#B8B5AE; --border:#E4E2DD; --border2:#C7C5BF; --border3:#E0DED9;
  --panel:#FCFCFB; --panel2:#FAFAF8; --panel3:#EFEFEC; --panel4:#ECECEA; --bg:#FFFFFF;
}
/* text roles */
.title   { font-size:14px; font-weight:600; fill:var(--tx-dark); }
.sub     { font-size:11px; font-weight:600; fill:var(--sub); }
.lbl     { font-size:9.5px; fill:var(--label); }
.note    { font-size:9.5px; fill:var(--muted); }
.coord   { font-size:10px;  fill:var(--sub); }
.exonlbl { font-size:9.5px; fill:var(--tx-dark); text-anchor:middle; }
.oncig   { font-size:11px; fill:#FFFFFF; text-anchor:middle; }   /* cigar on a filled bar */
/* alignment-track shapes */
.bg      { fill:var(--bg); }
.m       { fill:var(--tx); }                                     /* matched (M) bar */
.exon    { fill:var(--exon); stroke:var(--exon-line); }
.intron  { stroke:var(--tx); stroke-width:2; fill:none; }        /* spliced-read N */
.gline   { stroke:var(--line); stroke-width:1.6; }               /* genome intron span */
.keepbar { fill:var(--keep); }
.tick    { stroke:var(--sub); stroke-width:1.3; }
.bnd     { stroke:var(--drop); stroke-width:1.6; stroke-dasharray:3,2; }  /* boundary line */
/* panels / flow */
.panel   { fill:var(--panel); stroke:var(--border); }
.arrline { stroke:var(--muted); stroke-width:1.4; }
</style>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#9B9893"/>
  </marker>
  <marker id="arrSupp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#B07CC6"/>
  </marker>
  <pattern id="softclip" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="5" fill="#FBEFD0"/>
    <line x1="0" y1="0" x2="0" y2="5" stroke="#EFB94B" stroke-width="1.6"/>
  </pattern>
</defs>
<rect class="bg" x="0" y="0" width="880" height="372"/>

<!-- legend -->
<g transform="translate(160,0)">
<rect x="556" y="18" width="148" height="74" rx="4" fill="var(--panel)" stroke="var(--border)"/>
<rect x="566" y="30" width="20" height="11" rx="2" fill="var(--tx)"/>
<text x="592" y="39" font-size="10" fill="var(--label)">matched (M)</text>
<rect x="566" y="46" width="20" height="11" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="592" y="55" font-size="10" fill="var(--label)">exon (genome)</text>
<line x1="566" y1="73" x2="586" y2="73" stroke="var(--tx)" stroke-width="2"/>
<text x="592" y="76" font-size="10" fill="var(--label)">intron (N)</text>
</g>

<!-- BEFORE: read aligned to the transcriptome, exons packed adjacent -->
<text x="60" y="34" font-size="14" font-weight="600" fill="var(--tx-dark)">before  &#183;  read aligns to the transcriptome</text>
<rect x="60" y="50" width="207" height="13" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="267" y="50" width="140" height="13" fill="var(--exon)" stroke="var(--exon-line)"/>
<text x="163" y="60" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon A</text>
<text x="337" y="60" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon B</text>
<rect x="60" y="68" width="347" height="20" rx="3" fill="var(--tx)"/>
<text x="233" y="82" font-size="11" text-anchor="middle" fill="var(--bg)">151M</text>
<line x1="267" y1="64" x2="267" y2="92" stroke="var(--drop)" stroke-width="1.6" stroke-dasharray="3,2"/>
<text x="267" y="104" font-size="9.5" text-anchor="middle" fill="var(--drop)">exon boundary the read crosses</text>

<!-- arrow -->
<line x1="120" y1="116" x2="120" y2="150" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#arr)"/>
<text x="134" y="138" font-size="11" fill="var(--sub)">insert N at the boundary; matched bases stay M</text>

<!-- REFERENCE GENOME track -->
<text x="60" y="170" font-size="11" font-weight="600" fill="var(--sub)">reference genome  &#183;  chr8</text>
<rect x="60" y="184" width="207" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<rect x="397" y="184" width="140" height="14" rx="2" fill="var(--exon)" stroke="var(--exon-line)"/>
<line x1="267" y1="191" x2="397" y2="191" stroke="var(--line)" stroke-width="1.6"/>
<text x="163" y="194" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon A</text>
<text x="467" y="194" font-size="9.5" text-anchor="middle" fill="var(--tx-dark)">exon B</text>
<text x="332" y="186" font-size="9" text-anchor="middle" fill="var(--muted)">5,000 bp intron (not to scale)</text>
<line x1="60" y1="198" x2="60" y2="207" stroke="var(--sub)" stroke-width="1.3"/>
<text x="85" y="220" font-size="10" text-anchor="middle" fill="var(--sub)">128,750,000</text>
<line x1="397" y1="198" x2="397" y2="207" stroke="var(--sub)" stroke-width="1.3"/>
<text x="422" y="220" font-size="10" text-anchor="middle" fill="var(--sub)">128,755,090</text>

<!-- AFTER: spliced genomic read -->
<text x="60" y="256" font-size="14" font-weight="600" fill="var(--tx-dark)">after  &#183;  spliced genomic read</text>
<rect x="60" y="270" width="207" height="20" rx="3" fill="var(--tx)"/>
<text x="163" y="284" font-size="11" text-anchor="middle" fill="var(--bg)">90M</text>
<line x1="267" y1="280" x2="310" y2="280" stroke="var(--tx)" stroke-width="2"/>
<line x1="354" y1="280" x2="397" y2="280" stroke="var(--tx)" stroke-width="2"/>
<text x="332" y="284" font-size="11" text-anchor="middle" fill="var(--tx-dark)">5000N</text>
<rect x="397" y="270" width="140" height="20" rx="3" fill="var(--tx)"/>
<text x="467" y="284" font-size="11" text-anchor="middle" fill="var(--bg)">61M</text>
<text x="60" y="305" font-size="9.5" fill="var(--muted)">only CIGAR and pos is translated; MAPQ is set later</text>
</svg>
